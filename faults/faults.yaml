apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop
  template:
    metadata:
      labels:
        app: crashloop
    spec:
      containers:
      - name: crashloop
        image: busybox
        command: ["/bin/sh", "-c", "exit 1"]
---
---
apiVersion: v1
kind: Service
metadata:
  name: broken-service
spec:
  selector:
    app: nonexistent-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
